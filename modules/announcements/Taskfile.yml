# https://taskfile.dev
version: '3'

tasks:
    # ── Testing ───────────────────────────────────────────────────
    test:php:
        desc: Run PHPUnit tests for Announcements module
        cmd: php artisan test --testsuite=Modules --filter='^Modules\\Announcements\\Tests'

    test:e2e:
        desc: Run E2E tests for Announcements module
        cmd: npx playwright test --project="@announcements*" {{.CLI_ARGS}}
        interactive: true

    # ── Database ──────────────────────────────────────────────────

    db:seed:
        desc: Seed the Announcements module database
        cmd: php artisan modules:seed --module=announcements

    # ── Code Generation ────────────────────────────────────────────

    types:generate:
        desc: Generate TypeScript types from PHP DTOs and enums
        cmd: php artisan module:generate-types announcements
