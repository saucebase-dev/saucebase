# https://taskfile.dev
version: '3'

tasks:
    # ── Webhook ───────────────────────────────────────────────────

    webhook:stripe:listen:
        desc: Listen to Stripe webhooks and forward to local endpoint
        cmd: stripe listen --forward-to https://localhost/billing/webhooks/stripe

    # ── Testing ───────────────────────────────────────────────────
    test:php:
        desc: Run PHPUnit tests for Billing module
        cmd: php artisan test --testsuite=Modules --filter='^Modules\\Billing\\Tests'

    test:e2e:
        desc: Run E2E tests for Billing module
        cmd: npx playwright test --project="@billing*" {{.CLI_ARGS}}
        interactive: true

    # ── Database ──────────────────────────────────────────────────

    db:seed:
        desc: Seed the Billing module database
        cmd: php artisan modules:seed --module=billing

    # ── Code Generation ────────────────────────────────────────────

    types:generate:
        desc: Generate TypeScript types from PHP DTOs and enums
        cmd: php artisan module:generate-types billing
