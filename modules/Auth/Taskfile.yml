# https://taskfile.dev
version: '3'

tasks:
    # ── Testing ───────────────────────────────────────────────────
    test:php:
        desc: Run PHPUnit tests for Auth module
        cmd: php artisan test --testsuite=Modules --filter='^Modules\\Auth\\Tests'

    test:e2e:
        desc: Run E2E tests for Auth module
        cmd: npx playwright test --project="@Auth*" {{.CLI_ARGS}}
        interactive: true
