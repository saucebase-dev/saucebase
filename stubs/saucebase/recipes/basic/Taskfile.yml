# https://taskfile.dev
version: '3'

tasks:
    # ── Testing ───────────────────────────────────────────────────
    test:php:
        desc: Run PHPUnit tests for {Module} module
        cmd: php artisan test --testsuite=Modules --filter='^Modules\\{Module}\\Tests'

    test:e2e:
        desc: Run E2E tests for {Module} module
        cmd: npx playwright test --project="@{Module}*" {{.CLI_ARGS}}
        interactive: true

    # ── Code Generation ────────────────────────────────────────────

    types:generate:
        desc: Generate TypeScript types from PHP DTOs and enums
        cmd: php artisan module:generate-types {Module}
