# https://taskfile.dev
version: '3'

dotenv: ['.env']

vars:
  APP: '{{if eq .SAUCEBASE_ENV "docker"}}docker compose exec app{{else if eq .SAUCEBASE_ENV "sail"}}./vendor/bin/sail{{end}}'

includes:
    # ── BEGIN MODULES ────────────────────────────────────────────────
    auth:
        taskfile: ./modules/auth/Taskfile.yml
        optional: true
    settings:
        taskfile: ./modules/settings/Taskfile.yml
        optional: true
    billing:
        taskfile: ./modules/billing/Taskfile.yml
        optional: true
    announcements:
        taskfile: ./modules/announcements/Taskfile.yml
        optional: true
    roadmap:
        taskfile: ./modules/roadmap/Taskfile.yml
        optional: true
    themes:
        taskfile: ./modules/themes/Taskfile.yml
        optional: true
    demo:
        taskfile: ./modules/demo/Taskfile.yml
        optional: true
    blog:
        taskfile: ./modules/blog/Taskfile.yml
        optional: true
    # ── END MODULES ──────────────────────────────────────────────────

tasks:
    # ── Installation ──────────────────────────────────────────────

    install:docker:
        desc: Fresh install — Docker + Node required
        cmd: bash bin/setup-env {{.CLI_ARGS}}

    install:
        desc: Fresh install (PHP, Composer, Node required)
        cmds:
            - composer install
            - '{{.APP}} php artisan saucebase:install --all-modules'
            - npm install

    # ── Development ───────────────────────────────────────────────

    dev:
        desc: Start vite dev server (with HMR)
        cmd: npm run dev

    serve:
        desc: Start dev server (app, queue, logs, vite)
        cmd: composer dev

    build:
        desc: Production build (includes SSR)
        cmd: npm run build
    
    artisan:
        desc: 'Run artisan commands. Eg: task artisan -- route:list'
        cmd: '{{.APP}} php artisan {{.CLI_ARGS}}'
    
    composer:
        desc: 'Run composer commands. Eg: task composer -- update'
        cmd: '{{.APP}} composer {{.CLI_ARGS}}'

    # ── Code quality ──────────────────────────────────────────────

    lint:
        desc: Run all linters (PHP + JS)
        cmds:
            - task: lint:php
            - task: lint:js

    lint:php:
        internal: true
        cmd: vendor/bin/pint

    lint:js:
        internal: true
        cmd: npm run lint

    format:
        desc: Prettier write
        cmd: npm run format

    analyse:
        desc: PHPStan static analysis (level 5)
        cmd: vendor/bin/phpstan analyse --memory-limit=2G

    # ── Testing ───────────────────────────────────────────────────

    test:php:
        desc: Run PHPUnit tests
        cmd: php artisan test {{.CLI_ARGS}}
        interactive: true

    test:e2e:
        desc: Run E2E tests
        cmd: npm run test:e2e {{.CLI_ARGS}}
        interactive: true
    test:e2e:single:
        desc: Run E2E tests with single worker
        cmd: npm run test:e2e -- --workers=1 --max-failures=1 {{.CLI_ARGS}}
        interactive: true

    # ── Helpers ───────────────────────────────────────────────────

    db:reset:
        desc: Reset database (migrate:fresh + module seeds)
        prompt: This will erase ALL data. Are you sure?
        cmds:
            - '{{.APP}} php artisan migrate:fresh --seed'
            - '{{.APP}} php artisan modules:seed'

    # ── Translation ───────────────────────────────────────────────

    translation:export:
        desc: Export translations to JSON files for all languages
        cmd: '{{.APP}} php artisan translatable:export pt_BR'

    # ── Pipelines ─────────────────────────────────────────────────

    check:
        desc: Full quality pipeline (lint + analyse + test)
        cmds:
            - task: lint
            - task: analyse
            - task: test
