name: Module Tests

on:
    pull_request:
    workflow_call:
        inputs:
            module:
                required: true
                type: string
                description: 'LowerCase module name, e.g. billing'
            dependencies:
                required: false
                type: string
                default: ''
                description: 'Space-separated Composer packages, e.g. saucebase/auth'

jobs:
    detect-frameworks:
        runs-on: ubuntu-latest
        if: inputs.module != ''
        outputs:
            matrix: ${{ steps.read.outputs.matrix }}
        steps:
            - name: Checkout module
              uses: actions/checkout@v5
              with:
                  path: module-src
            - name: Read supported frameworks from composer.json
              id: read
              run: |
                  fw=$(jq -c '.extra.saucebase.frameworks // ["vue"]' module-src/composer.json 2>/dev/null || echo '["vue"]')
                  echo "matrix=$fw" >> $GITHUB_OUTPUT

    phpunit:
        needs: detect-frameworks
        runs-on: ubuntu-latest
        timeout-minutes: 20
        if: inputs.module != ''
        strategy:
            matrix:
                framework: ${{ fromJSON(needs.detect-frameworks.outputs.matrix) }}
        name: PHPUnit ${{ inputs.module }} (${{ matrix.framework }})

        steps:
            - name: Checkout module
              uses: actions/checkout@v5
              with:
                  path: module-src

            - name: Clone Saucebase
              uses: actions/checkout@v5
              with:
                  repository: saucebase-dev/saucebase
                  ref: main
                  path: saucebase

            - name: Install module from local checkout
              env:
                  MODULE: ${{ inputs.module }}
              run: |
                  pkg=$(echo "$MODULE" | tr '[:upper:]' '[:lower:]')
                  rm -rf saucebase/modules/$pkg
                  cp -r module-src saucebase/modules/$pkg

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: pdo, pdo_sqlite, mbstring, zip, pcntl, intl, exif
                  coverage: none

            - name: Install dependencies
              if: inputs.dependencies != ''
              working-directory: saucebase
              env:
                  DEPENDENCIES: ${{ inputs.dependencies }}
              run: |
                  for dep in $DEPENDENCIES; do
                      composer require "$dep" --dev --no-interaction --no-scripts
                  done

            - name: Require module in Composer
              working-directory: saucebase
              env:
                  MODULE: ${{ inputs.module }}
              run: |
                  pkg=$(echo "$MODULE" | tr '[:upper:]' '[:lower:]')
                  composer require "saucebase/$pkg:@dev" --no-interaction --no-scripts

            - name: Apply patches
              env:
                  MODULE: ${{ inputs.module }}
                  DEPENDENCIES: ${{ inputs.dependencies }}
              run: |
                  apply_patches() {
                      local dir="$1"
                      for f in "$dir"/*.patch; do
                          [ -f "$f" ] || continue
                          echo "Applying patch: $f"
                          patch -p1 -d saucebase < "$f"
                      done
                  }
                  # Dependencies first (in declared order)
                  for dep in $DEPENDENCIES; do
                      pkg="${dep#saucebase/}"
                      apply_patches "saucebase/modules/$pkg/patches"
                  done
                  # Primary module last
                  mod=$(echo "$MODULE" | tr '[:upper:]' '[:lower:]')
                  apply_patches "saucebase/modules/$mod/patches"

            - name: Install Composer dependencies
              working-directory: saucebase
              run: composer update --prefer-dist --no-interaction --no-progress --no-scripts && composer dump-autoload --no-scripts

            - name: Setup Laravel environment
              uses: ./saucebase/.github/actions/setup-laravel
              with:
                  working-directory: saucebase
                  skip-composer: 'true'
                  skip-php: 'true'
                  framework: ${{ matrix.framework }}

            - name: Run PHPUnit tests
              working-directory: saucebase
              env:
                  MODULE: ${{ inputs.module }}
              run: |
                  pkg=$(echo "$MODULE" | tr '[:upper:]' '[:lower:]')
                  php artisan test modules/$pkg/tests

            - name: Archive saucebase environment
              run: tar --exclude='saucebase/node_modules' -czf saucebase-env.tar.gz saucebase/

            - name: Upload environment artifact
              uses: actions/upload-artifact@v4
              with:
                  name: saucebase-env-${{ inputs.module }}-${{ matrix.framework }}
                  path: saucebase-env.tar.gz
                  retention-days: 1

    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [detect-frameworks, phpunit]
        if: inputs.module != ''
        strategy:
            matrix:
                framework: ${{ fromJSON(needs.detect-frameworks.outputs.matrix) }}
        name: E2E ${{ inputs.module }} (${{ matrix.framework }})

        steps:
            - name: Download environment artifact
              uses: actions/download-artifact@v4
              with:
                  name: saucebase-env-${{ inputs.module }}-${{ matrix.framework }}

            - name: Extract environment
              run: tar -xzf saucebase-env.tar.gz

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '22'
                  cache: npm
                  cache-dependency-path: saucebase/package-lock.json

            - name: Install npm dependencies
              working-directory: saucebase
              run: npm ci

            - name: Install Playwright
              working-directory: saucebase
              run: npx playwright install chromium --with-deps

            - name: Start Laravel server
              working-directory: saucebase
              run: php artisan serve --host=0.0.0.0 --port=8000 &

            - name: Wait for server
              run: |
                  timeout 30 bash -c 'until curl -f http://localhost:8000 > /dev/null 2>&1; do
                    echo "Waiting for server..."
                    sleep 2
                  done'
                  echo "Server is ready!"

            - name: Run E2E tests
              working-directory: saucebase
              env:
                  APP_URL: http://localhost:8000
                  MODULE: ${{ inputs.module }}
              run: npx playwright test modules/$MODULE/tests/e2e --max-failures=2

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-${{ inputs.module }}-${{ matrix.framework }}
                  path: saucebase/playwright-report/
                  retention-days: 7
