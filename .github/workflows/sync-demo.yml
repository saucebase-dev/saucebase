name: Sync Demo

on:
    push:
        branches: [main]
    workflow_dispatch:
    repository_dispatch:
        types: [module-released]

permissions:
    contents: read

jobs:
    sync:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout saucebase
              uses: actions/checkout@v4

            - name: Discover modules from Packagist
              run: |
                  PACKAGES=$(curl -s "https://packagist.org/packages/list.json?type=saucebase-module&fields[]=abandoned" \
                    | jq -r '.packages | to_entries[] | select(.value.abandoned == false) | .key' \
                    | tr '\n' ' ')
                  echo "PACKAGES=$PACKAGES" >> $GITHUB_ENV

            - name: Clone modules from GitHub
              if: env.PACKAGES != ''
              run: |
                  for pkg in $PACKAGES; do
                      name="${pkg#saucebase/}"
                      mod=$(echo "$name" | sed 's/-\([a-z]\)/\u\1/g; s/^\([a-z]\)/\u\1/')
                      REPO=$(curl -s "https://packagist.org/packages/$pkg.json" | jq -r '.package.repository')
                      git clone --depth=1 "$REPO" "modules/$mod"
                  done

            - name: Apply patches
              if: env.PACKAGES != ''
              run: |
                  apply_patches() {
                      local dir="$1"
                      for f in "$dir"/*.patch; do
                          [ -f "$f" ] || continue
                          echo "Applying patch: $f"
                          patch -p1 < "$f"
                      done
                  }
                  for pkg in $PACKAGES; do
                      name="${pkg#saucebase/}"
                      mod=$(echo "$name" | sed 's/-\([a-z]\)/\u\1/g; s/^\([a-z]\)/\u\1/')
                      apply_patches "modules/$mod/.github/patches"
                  done

            - name: Push to demo repository
              env:
                  DEMO_PAT: ${{ secrets.DEMO_PAT }}
              run: |
                  if [ -z "$DEMO_PAT" ]; then
                      echo "::error::DEMO_PAT secret is not set. Add it at Settings → Secrets → Actions in sauce-base/saucebase."
                      exit 1
                  fi

                  SAUCEBASE_SHA=$(git rev-parse --short HEAD)

                  mkdir ../demo-push
                  rsync -a --delete \
                    --exclude='.git/' \
                    --exclude='.github/' \
                    --exclude='node_modules/' \
                    --exclude='vendor/' \
                    ./ ../demo-push/

                  cd ../demo-push

                  git init
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git remote add origin "https://x-access-token:${DEMO_PAT}@github.com/sauce-base/demo.git"
                  git add -A
                  git commit -m "chore: sync demo from saucebase@${SAUCEBASE_SHA}"
                  git push origin HEAD:main --force
