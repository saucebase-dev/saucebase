name: Tests

on:
    pull_request:
        branches: [demo]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    phpunit-raw:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        name: PHPUnit (raw)

        steps:
            - uses: actions/checkout@v5

            - uses: ./.github/actions/setup-laravel
              with:
                  skip-build: 'true'

            - name: Run tests
              run: php artisan test

    phpunit:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: phpunit-raw
        strategy:
            matrix:
                framework: [vue, react]
        name: PHPUnit (${{ matrix.framework }})

        steps:
            - uses: actions/checkout@v5

            - uses: ./.github/actions/setup-laravel
              with:
                  framework: ${{ matrix.framework }}

            - name: Run tests
              run: php artisan test

    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: phpunit
        strategy:
            matrix:
                framework: [vue, react]
        name: E2E (${{ matrix.framework }})

        steps:
            - uses: actions/checkout@v5

            - uses: ./.github/actions/setup-laravel
              with:
                  framework: ${{ matrix.framework }}

            - name: Install Playwright
              run: npx playwright install chromium --with-deps

            - name: Start Laravel server
              run: php artisan serve --host=0.0.0.0 --port=8000 &
              env:
                  APP_ENV: testing

            - name: Wait for server
              run: |
                  timeout 30 bash -c 'until curl -f http://localhost:8000 > /dev/null 2>&1; do
                    echo "Waiting for Laravel server..."
                    sleep 2
                  done'
                  echo "Server is ready!"

            - name: Run E2E tests
              run: npm run test:e2e
              env:
                  APP_URL: http://localhost:8000

            - name: Upload test report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-${{ matrix.framework }}
                  path: playwright-report/
                  retention-days: 7
